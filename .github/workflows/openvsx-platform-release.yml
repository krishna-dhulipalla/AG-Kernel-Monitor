name: openvsx-platform-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Check extension syntax
        run: node --check vscode/extension.cjs

      - name: Build Bun fallback bundle
        run: bun run build:vsx-cli

  package-platform:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vscode_target:
          - win32-x64
          - win32-arm64
          - darwin-x64
          - darwin-arm64
          - linux-x64
          - linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Build bundled Bun fallback
        run: bun run build:vsx-cli

      - name: Build native runtime for target
        run: bun run scripts/build-platform-binaries.ts ${{ matrix.vscode_target }}

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.vscode_target }} --out artifacts/ag-kernel-monitor-${{ matrix.vscode_target }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ag-kernel-monitor-${{ matrix.vscode_target }}
          path: artifacts/ag-kernel-monitor-${{ matrix.vscode_target }}.vsix
