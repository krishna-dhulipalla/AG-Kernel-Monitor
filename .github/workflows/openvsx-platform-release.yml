name: openvsx-platform-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Check extension syntax
        run: node --check vscode/extension.cjs

      - name: Check monitor runtime syntax
        run: node --check vscode/monitor-runtime.cjs

  package-universal:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Package VSIX
        run: npx @vscode/vsce package --out artifacts/ag-kernel-monitor.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ag-kernel-monitor
          path: artifacts/ag-kernel-monitor.vsix
